name: Lint

on:
  push:
    paths:
      - '.github/workflows/typecheck.yml'
      - '**.py'
  pull_request:
    paths:
      - '.github/workflows/typecheck.yml'
      - '**.py'

jobs:
  ty:
    name: Ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv run ty check .
