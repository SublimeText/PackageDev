name: Lint

on:
  push:
    branch: master
    paths:
      - '.github/workflows/lint.yml'
      - '**.py'
  pull_request:
    paths:
      - '.github/workflows/lint.yml'
      - '**.py'

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv run ruff check .
